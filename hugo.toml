baseURL = 'https://alandevc8763.github.io/digital-twin-blog/'
languageCode = 'zh-tw'
title = "Alan's Digital Twin Blog"
theme = 'PaperMod'

[params]
    env = 'production'
    title = 'Alan\'s Digital Twin Blog'
    description = 'SRE, HomeLab, and AI Engineering Insights'
    author = 'Alan'
    
    # 視覺風格配置 (Gold-on-Slate)
    # PaperMod 原生支持 Class-based theme switching, 
    # 我們將通過 custom CSS 進一步精細化 Gold 顏色
    defaultTheme = 'dark'
    showCodeCopy = true
    
    # 導航配置
    [params.homeInfoParams]
        Title = 'Alan\'s Digital Twin'
        Content = 'Architecting the bridge from Silicon to Prompt. Exploring SRE, HomeLab, and AI Engineering.'

    [[params.socialIcons]]
        name = 'github'
        url = 'https://github.com/alandevc8763'

[menu]
    [[menu.main]]
        name = 'SRE Hub'
        url = '/categories/sre/'
        weight = 10
    [[menu.main]]
        name = 'AI Hub'
        url = '/categories/ai/'
        weight = 20
    [[menu.main]]
        name = 'HomeLab Hub'
        url = '/categories/homelab/'
        weight = 30
    [[menu.main]]
        name = 'Journey'
        url = '/journey/'
        weight = 40
